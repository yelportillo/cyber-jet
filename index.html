<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberPlane - Neon Flight</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #050505;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #0ff;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;

        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 400px;
            max-height: 600px;
            border: 4px solid #0ff;
            box-shadow: 0 0 20px #0ff, inset 0 0 20px #0ff;
            background: linear-gradient(to bottom, #000 0%, #001122 100%);
            box-sizing: border-box;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 24px;
            text-shadow: 0 0 10px #0ff;
            pointer-events: none;
            z-index: 10;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 20;
        }
        h1 {
            font-size: clamp(32px, 10vw, 48px);
            margin-bottom: 20px;
            text-shadow: 0 0 20px #0ff;
        }
        .btn {
            padding: 15px 30px;
            background: transparent;
            color: #0ff;
            border: 2px solid #0ff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px #0ff;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 25px #0ff;
        }
    </style>

</head>
<body>

    <div id="game-container">
        <div id="ui">SCORE: 0</div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="overlay">
            <h1>CYBER JET</h1>
            <p>AVOID THE NEON TOWERS</p>
            <button class="btn" onclick="startGame()">INITIATE FLIGHT</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const overlay = document.getElementById('overlay');

        // Audio Setup
        let audioCtx;
        const bgm = new Audio('music.mp3');
        bgm.loop = true;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } else if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            bgm.play().catch(e => console.error("BGM playback failed:", e));
        }

        function playNote(freq, type, duration, volume = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playKick() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function playSnare() {
            if (!audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 0.1;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 1000;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
        }

        function playBgm() {
            // Programmatic BGM is now replaced by music.mp3
        }


        playBgm();

        // Game Constants
        const GRAVITY = 0.20; // Reduced from 0.25
        const FLAP = -4.5;    // Slightly reduced from -5 for more control
        const SPAWN_RATE = 110; // Increased from 90 (Pipes spawn less frequently)
        const PIPE_WIDTH = 60;
        const PIPE_GAP = 190;  // Increased from 160 (Wider gap to fly through)

        let plane, pipes, score, frames, gameRunning;

        function init() {
            plane = {
                x: 50,
                y: 300,
                width: 34,
                height: 24,
                velocity: 0,
                rotation: 0
            };
            pipes = [];
            score = 0;
            frames = 0;
            gameRunning = false;
        }

        function startGame() {
            initAudio();
            init();
            gameRunning = true;
            overlay.style.display = 'none';
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            bgm.pause();
            bgm.currentTime = 0;
            overlay.style.display = 'flex';
            overlay.innerHTML = `
                <h1>SYSTEM CRASH</h1>
                <p>SCORE: ${score}</p>
                <button class="btn" onclick="startGame()">REBOOT SYSTEM</button>
            `;
        }

        function drawPlane() {
            ctx.save();
            ctx.translate(plane.x + plane.width/2, plane.y + plane.height/2);

            // Calculate rotation based on velocity
            plane.rotation = Math.min(Math.PI/6, Math.max(-Math.PI/6, plane.velocity * 0.06));
            ctx.rotate(plane.rotation);

            // Flip to face RIGHT
            ctx.scale(-1, 1);

            // Neon Glow Effects
            ctx.shadowBlur = 25;
            ctx.shadowColor = '#0ff';

            // --- EXOTIC CYBER STEALTH JET ---

            // 1. Primary Fuselage (Angular, Stealthy)
            ctx.fillStyle = '#0ff';
            ctx.beginPath();
            ctx.moveTo(-30, 0);               // Needle nose
            ctx.lineTo(-10, -3);              // Top edge
            ctx.lineTo(15, -5);               // Mid body
            ctx.lineTo(25, 0);                // Tail point
            ctx.lineTo(15, 5);                // Bottom edge
            ctx.lineTo(-10, 3);               // Bottom front
            ctx.closePath();
            ctx.fill();

            // 2. Swept-back Wing-lets (Aggressive Stealth)
            ctx.beginPath();
            ctx.moveTo(-5, 0);                // Root
            ctx.lineTo(12, 0);                // Body length
            ctx.lineTo(8, 25);                // Outer wing tip
            ctx.lineTo(-8, 0);                // Back to nose
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(-5, 0);                // Root
            ctx.lineTo(12, 0);                // Body length
            ctx.lineTo(8, -25);               // Outer wing tip
            ctx.lineTo(-8, 0);                // Back to nose
            ctx.closePath();
            ctx.fill();

            // 3. Dual Outward-Canted Tail Fins (Modern F-22 style)
            ctx.beginPath();
            ctx.moveTo(15, -2);
            ctx.lineTo(25, -12);              // Top outer
            ctx.lineTo(28, -2);              // Tail end
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(15, 2);
            ctx.lineTo(25, 12);               // Bottom outer
            ctx.lineTo(28, 2);                // Tail end
            ctx.closePath();
            ctx.fill();

            // 4. Glowing Cockpit Canopy
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.ellipse(-12, 0, 8, 3, 0, 0, Math.PI * 2);
            ctx.fill();

            // 5. Hyper-Drive Afterburner (Animated Plasma)
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 40;
            ctx.shadowColor = '#0ff';

            // Main Plasma Jet
            const flameLength = 15 + Math.random() * 15;
            const flameWidth = 4 + Math.random() * 4;
            ctx.beginPath();
            ctx.moveTo(25, -flameWidth/2);
            ctx.lineTo(25 + flameLength, 0);
            ctx.lineTo(25, flameWidth/2);
            ctx.closePath();
            ctx.fill();

            // Hot core
            ctx.beginPath();
            ctx.arc(25, 0, 5, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawPipes() {
            pipes.forEach(pipe => {
                ctx.fillStyle = '#f0f'; // Neon Magenta
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#f0f';

                // Top pipe
                ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.top);
                // Bottom pipe
                ctx.fillRect(pipe.x, canvas.height - pipe.bottom, PIPE_WIDTH, pipe.bottom);

                // Pipe caps (brighter neon)
                ctx.fillStyle = '#fff';
                ctx.fillRect(pipe.x - 2, pipe.top - 10, PIPE_WIDTH + 4, 10);
                ctx.fillRect(pipe.x - 2, canvas.height - pipe.bottom, PIPE_WIDTH + 4, 10);
            });
        }

        function update() {
            plane.velocity += GRAVITY;
            plane.y += plane.velocity;

            // Floor/Ceiling collision
            if (plane.y + plane.height > canvas.height || plane.y < 0) {
                gameOver();
            }

            // Pipes logic
            if (frames % SPAWN_RATE === 0) {
                const top = Math.random() * (canvas.height - PIPE_GAP - 100) + 50;
                pipes.push({
                    x: canvas.width,
                    top: top,
                    bottom: canvas.height - top - PIPE_GAP,
                    passed: false
                });
            }

            pipes.forEach((pipe, index) => {
                pipe.x -= 3;

                // Collision detection
                if (
                    plane.x < pipe.x + PIPE_WIDTH &&
                    plane.x + plane.width > pipe.x &&
                    (plane.y < pipe.top || plane.y + plane.height > canvas.height - pipe.bottom)
                ) {
                    gameOver();
                }

                // Scoring
                if (!pipe.passed && pipe.x + PIPE_WIDTH < plane.x) {
                    score++;
                    pipe.passed = true;
                    ui.innerText = `SCORE: ${score}`;
                }

                // Remove off-screen pipes
                if (pipe.x + PIPE_WIDTH < 0) {
                    pipes.splice(index, 1);
                }
            });

            frames++;
        }

        function gameLoop() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Background Cityscape
            drawCity();

            // Background Grid Effect
            ctx.strokeStyle = '#002244';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=40) {
                ctx.beginPath();
                ctx.moveTo(i - (frames % 40), 0);
                ctx.lineTo(i - (frames % 40), canvas.height);
                ctx.stroke();
            }
            for(let i=0; i<canvas.height; i+=40) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            update();
            drawPipes();
            drawPlane();

            requestAnimationFrame(gameLoop);
        }

        function drawCity() {
            const buildingCount = 12;
            const spacing = canvas.width / 4;

            ctx.fillStyle = '#000811';
            ctx.shadowBlur = 0;

            for (let i = 0; i < buildingCount; i++) {
                // Parallax effect: move buildings slower than the grid
                const x = (i * 60 - (frames * 0.5) % 120);
                const width = 50 + (i % 3) * 20;
                const height = 100 + (i % 5) * 100;

                // Building block
                ctx.fillRect(x, canvas.height - height, width, height);

                // Neon Windows
                ctx.fillStyle = '#003366';
                for (let wy = canvas.height - height + 20; wy < canvas.height - 20; wy += 30) {
                    for (let wx = x + 10; wx < x + width - 10; wx += 15) {
                        if (Math.random() > 0.3) {
                            ctx.fillRect(wx, wy, 5, 8);
                        }
                    }
                }
                ctx.fillStyle = '#000811';
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && gameRunning) {
                plane.velocity = FLAP;
            }
        });

        window.addEventListener('mousedown', (e) => {
            if (gameRunning) {
                plane.velocity = FLAP;
            }
        });

        window.addEventListener('touchstart', (e) => {
            if (gameRunning) {
                e.preventDefault();
                plane.velocity = FLAP;
            }
        }, { passive: false });

        init();
    </script>
</body>
</html>
